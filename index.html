<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY TERMUX COMMANDS</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        /* ============================================
           ROOT VARIABLES
           ============================================ */
        :root {
            --primary: #ff0033;
            --primary-glow: #ff0033;
            --bg: #0a0000;
            --card-bg: rgba(20,0,0,0.8);
            --text: #ff4444;
            --text-dim: #881111;
            --border-color: #ff003366;
            --shadow-color: rgba(255,0,51,0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* ============================================
           SKELETON BACKGROUND (KUTISHA)
           ============================================ */
        .skeleton-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(255,0,51,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(255,0,51,0.05) 0%, transparent 60%);
            overflow: hidden;
            pointer-events: none;
        }
        
        .skeleton-bg::before {
            content: '💀';
            position: absolute;
            font-size: 500px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.03;
            animation: skullPulse 8s ease-in-out infinite;
        }
        
        @keyframes skullPulse {
            0%, 100% { opacity: 0.03; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.08; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        .skeleton-bg .skull-text {
            position: absolute;
            font-size: 30px;
            font-weight: 900;
            color: rgba(255,0,51,0.02);
            letter-spacing: 10px;
            animation: floatSkull 25s linear infinite;
            text-shadow: 0 0 100px rgba(255,0,51,0.05);
        }
        
        @keyframes floatSkull {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
        
        /* Glowing particles (damu) */
        .blood-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        
        .blood-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,0,51,0.15);
            border-radius: 50%;
            animation: bloodRise 15s infinite linear;
            box-shadow: 0 0 20px rgba(255,0,51,0.1);
        }
        
        @keyframes bloodRise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        
        /* ============================================
           LOGIN SCREEN
           ============================================ */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: rgba(0,0,0,0.97);
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
        }
        
        .login-container {
            background: rgba(20,0,0,0.9);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 45px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 0 80px rgba(255,0,51,0.15), inset 0 0 80px rgba(255,0,51,0.03);
            position: relative;
            overflow: hidden;
        }
        
        .login-container::before {
            content: '💀';
            position: absolute;
            top: -50px;
            right: -30px;
            font-size: 120px;
            opacity: 0.03;
        }
        
        .login-container .logo {
            font-size: 60px;
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
            text-shadow: 0 0 60px rgba(255,0,51,0.3);
            animation: pulseLogo 2s ease-in-out infinite;
        }
        
        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); text-shadow: 0 0 60px rgba(255,0,51,0.3); }
            50% { transform: scale(1.05); text-shadow: 0 0 100px rgba(255,0,51,0.5); }
        }
        
        .login-container h1 {
            font-size: 32px;
            text-align: center;
            color: var(--primary);
            text-shadow: 0 0 40px rgba(255,0,51,0.2);
            margin-bottom: 5px;
            letter-spacing: 3px;
        }
        
        .login-container p {
            text-align: center;
            color: rgba(255,68,68,0.4);
            font-size: 13px;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        
        .login-container .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(255,0,51,0.05);
            border-radius: 16px;
            padding: 5px;
            border: 1px solid rgba(255,0,51,0.1);
        }
        
        .login-container .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: rgba(255,68,68,0.4);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }
        
        .login-container .tab-btn.active {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 40px rgba(255,0,51,0.3);
        }
        
        .login-container .tab-btn:hover:not(.active) {
            color: var(--text);
        }
        
        .login-container .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        .login-container .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-container .form-group {
            margin-bottom: 18px;
        }
        
        .login-container .form-group label {
            display: block;
            color: rgba(255,68,68,0.6);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .login-container .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255,0,51,0.1);
            border-radius: 12px;
            background: rgba(255,0,51,0.03);
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            font-family: 'Courier New', monospace;
        }
        
        .login-container .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255,0,51,0.08);
        }
        
        .login-container .form-group input::placeholder {
            color: rgba(255,68,68,0.2);
        }
        
        .login-container .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .login-container .btn-primary {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 40px rgba(255,0,51,0.2);
        }
        
        .login-container .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 50px rgba(255,0,51,0.4);
        }
        
        .login-container .btn-google {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 2px solid rgba(255,0,51,0.15);
            margin-top: 10px;
        }
        
        .login-container .btn-google:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        
        .login-container .btn-google svg {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
        
        .login-container .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        
        .login-container .divider::before,
        .login-container .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,0,51,0.06);
        }
        
        .login-container .divider-text {
            color: rgba(255,68,68,0.2);
            font-size: 11px;
            padding: 0 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .login-container .message {
            display: none;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .login-container .message.active {
            display: block;
        }
        
        .login-container .message.error {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.2);
            color: #ff6b6b;
        }
        
        .login-container .message.success {
            background: rgba(40,167,69,0.15);
            border: 1px solid rgba(40,167,69,0.2);
            color: #51cf66;
        }
        
        .login-container .loading {
            display: none;
            text-align: center;
            padding: 12px;
            color: rgba(255,68,68,0.6);
            font-size: 14px;
        }
        
        .login-container .loading.active {
            display: block;
        }
        
        .login-container .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,0,51,0.06);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ============================================
           APP CONTENT
           ============================================ */
        #appContent {
            display: none;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }
        
        #appContent.visible {
            display: block;
        }
        
        /* Header */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.95);
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-top h1 {
            font-size: 20px;
            color: var(--primary);
            text-shadow: 0 0 40px rgba(255,0,51,0.2);
            letter-spacing: 2px;
        }
        
        .header-top h1 i {
            margin-right: 10px;
        }
        
        .logout-btn {
            padding: 8px 20px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .logout-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 40px rgba(255,0,51,0.3);
        }
        
        /* Command Counter */
        .command-counter {
            text-align: center;
            padding: 12px;
            background: rgba(255,0,51,0.03);
            border-bottom: 1px solid rgba(255,0,51,0.05);
            color: rgba(255,68,68,0.5);
            font-size: 13px;
            letter-spacing: 2px;
        }
        
        .command-counter span {
            color: var(--primary);
            font-weight: bold;
            font-size: 16px;
        }
        
        /* Search */
        .search-box {
            padding: 15px;
            background: rgba(0,0,0,0.5);
        }
        
        .search-box input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,0,51,0.1);
            border-radius: 12px;
            background: rgba(255,0,51,0.03);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }
        
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255,0,51,0.05);
        }
        
        .search-box input::placeholder {
            color: rgba(255,68,68,0.2);
        }
        
        /* Categories */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 15px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,0,51,0.05);
        }
        
        .categories button {
            padding: 10px 20px;
            border: 2px solid rgba(255,0,51,0.1);
            border-radius: 25px;
            background: transparent;
            color: rgba(255,68,68,0.5);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .categories button:hover,
        .categories button.active {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 30px rgba(255,0,51,0.05);
        }
        
        /* Commands Grid */
        .commands-container {
            padding: 15px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .command-card {
            background: var(--card-bg);
            border: 1px solid rgba(255,0,51,0.05);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .command-card:hover {
            border-color: rgba(255,0,51,0.2);
            transform: translateX(5px);
            box-shadow: 0 0 40px rgba(255,0,51,0.03);
        }
        
        .command-left {
            flex: 1;
            min-width: 150px;
        }
        
        .command-left .cmd {
            color: var(--primary);
            font-size: 14px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }
        
        .command-left .desc {
            color: rgba(255,68,68,0.4);
            font-size: 12px;
            margin-top: 3px;
        }
        
        .command-right {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .copy-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,0,51,0.15);
            border-radius: 8px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }
        
        .copy-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255,0,51,0.2);
        }
        
        .copy-btn.copied {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }
        
        .command-tag {
            font-size: 9px;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(255,0,51,0.05);
            color: rgba(255,68,68,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,0,51,0.05);
        }
        
        /* No results */
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,68,68,0.2);
            font-size: 16px;
            letter-spacing: 3px;
        }
        
        .no-results i {
            font-size: 40px;
            display: block;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        
        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 15px;
            }
            
            .login-container h1 {
                font-size: 28px;
            }
            
            .header-top h1 {
                font-size: 16px;
            }
            
            .header-top {
                padding: 12px 15px;
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .command-card {
                padding: 14px 16px;
            }
            
            .command-left .cmd {
                font-size: 13px;
            }
            
            .categories button {
                font-size: 10px;
                padding: 8px 14px;
            }
        }
        
        @media (max-width: 360px) {
            .login-container {
                padding: 20px 15px;
            }
            
            .command-card {
                flex-direction: column;
                align-items: stretch;
            }
            
            .command-right {
                justify-content: flex-start;
            }
        }
        
        /* Scrollbar style */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,0,51,0.02);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #ff0033aa;
        }
    </style>
</head>
<body>

<!-- ==========================================
SKELETON BACKGROUND (KUTISHA)
========================================== -->
<div class="skeleton-bg">
    <div class="skull-text" style="left:10%; animation-delay:0s;">☠️</div>
    <div class="skull-text" style="left:30%; animation-delay:5s;">💀</div>
    <div class="skull-text" style="left:50%; animation-delay:10s;">☠️</div>
    <div class="skull-text" style="left:70%; animation-delay:15s;">💀</div>
    <div class="skull-text" style="left:90%; animation-delay:20s;">☠️</div>
</div>

<!-- Blood Particles -->
<div class="blood-particles" id="bloodParticles"></div>

<!-- ==========================================
LOGIN SCREEN
========================================== -->
<div id="loginScreen">
    <div class="login-container">
        <div class="logo">💀</div>
        <h1>DVARY</h1>
        <p>TERMUX COMMANDS • 1000+</p>
        
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="login">🔑 INGIA</button>
            <button class="tab-btn" data-tab="signup">📝 JIANDIKISHA</button>
        </div>
        
        <!-- Login Form -->
        <div id="loginForm" class="tab-content active">
            <form id="loginFormElement">
                <div class="form-group">
                    <label>📧 BARUA PEPE</label>
                    <input type="email" id="loginEmail" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 NENOSIRI</label>
                    <input type="password" id="loginPassword" placeholder="Nenosiri lako" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">🔑 INGIA</button>
            </form>
        </div>
        
        <!-- Signup Form -->
        <div id="signupForm" class="tab-content">
            <form id="signupFormElement">
                <div class="form-group">
                    <label>👤 JINA LAKO</label>
                    <input type="text" id="signupName" placeholder="Jina lako kamili" required>
                </div>
                <div class="form-group">
                    <label>📧 BARUA PEPE</label>
                    <input type="email" id="signupEmail" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 NENOSIRI</label>
                    <input type="password" id="signupPassword" placeholder="Angalau herufi 6" required minlength="6">
                </div>
                <div class="form-group">
                    <label>✅ THIBITISHA</label>
                    <input type="password" id="signupConfirmPassword" placeholder="Andika nenosiri tena" required>
                </div>
                <button type="submit" class="btn btn-primary">📝 JIANDIKISHA</button>
            </form>
        </div>
        
        <!-- Divider -->
        <div class="divider">
            <span class="divider-text">Au</span>
        </div>
        
        <!-- Google Sign In -->
        <button id="signInBtn" class="btn btn-google">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            INGIA NA GOOGLE
        </button>
        
        <!-- Loading -->
        <div id="loading" class="loading">
            <span class="spinner"></span> INAPAKIA...
        </div>
        
        <!-- Message -->
        <div id="message" class="message"></div>
    </div>
</div>

<!-- ==========================================
APP CONTENT
========================================== -->
<div id="appContent">
    
    <!-- Header -->
    <div class="header-top">
        <h1><i class="fas fa-skull"></i> DVARY TERMUX</h1>
        <button class="logout-btn" onclick="handleLogout()">🚪 TOKA</button>
    </div>
    
    <!-- Command Counter -->
    <div class="command-counter">
        💀 <span id="cmdCount">0</span> COMMANDS ZA TERMUX ZIPO • COPY & PASTE
    </div>
    
    <!-- Search -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Tafuta command... (e.g. pkg install, apt update)">
    </div>
    
    <!-- Categories -->

// ============================================
// RENDER COMMANDS
// ============================================
let currentCategory = 'all';
let currentSearch = '';

function renderCommands() {
    const container = document.getElementById('commandsContainer');
    let filtered = commands;
    
    // Filter by category
    if (currentCategory !== 'all') {
        filtered = filtered.filter(cmd => cmd.category === currentCategory);
    }
    
    // Filter by search
    if (currentSearch.trim()) {
        const search = currentSearch.toLowerCase().trim();
        filtered = filtered.filter(cmd => 
            cmd.cmd.toLowerCase().includes(search) || 
            cmd.desc.toLowerCase().includes(search)
        );
    }
    
    // Update counter
    document.getElementById('cmdCount').textContent = filtered.length;
    
    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="no-results">
                <i class="fas fa-skull"></i>
                HAKUNA COMMAND INAYOLINGANA
            </div>
        `;
        return;
    }
    
    let html = '';
    filtered.forEach(cmd => {
        const tag = cmd.category.toUpperCase();
        html += `
            <div class="command-card">
                <div class="command-left">
                    <div class="cmd">${cmd.cmd}</div>
                    <div class="desc">${cmd.desc}</div>
                </div>
                <div class="command-right">
                    <span class="command-tag">${tag}</span>
                    <button class="copy-btn" onclick="copyCommand('${cmd.cmd.replace(/'/g, "\\'")}', this)">
                        <i class="fas fa-copy"></i> COPY
                    </button>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

// ============================================
// COPY FUNCTION
// ============================================
function copyCommand(cmd, btn) {
    navigator.clipboard.writeText(cmd).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = '<i class="fas fa-check"></i> COPIED';
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '<i class="fas fa-copy"></i> COPY';
        }, 2000);
    }).catch(() => {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = cmd;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        btn.classList.add('copied');
        btn.innerHTML = '<i class="fas fa-check"></i> COPIED';
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '<i class="fas fa-copy"></i> COPY';
        }, 2000);
    });
}

// FIREBASE AUTH
// ============================================
const loginScreen = document.getElementById('loginScreen');
const appContent = document.getElementById('appContent');

// DOM elements
const loginFormEl = document.getElementById('loginFormElement');
const signupFormEl = document.getElementById('signupFormElement');
const loginEmail = document.getElementById('loginEmail');
const loginPassword = document.getElementById('loginPassword');
const signupName = document.getElementById('signupName');
const signupEmail = document.getElementById('signupEmail');
const signupPassword = document.getElementById('signupPassword');
const signupConfirm = document.getElementById('signupConfirmPassword');
const signInBtn = document.getElementById('signInBtn');
const loadingEl = document.getElementById('loading');
const messageEl = document.getElementById('message');
const tabBtnsEl = document.querySelectorAll('.tab-btn');

// Helpers
function showLoading() { loadingEl.classList.add('active'); }
function hideLoading() { loadingEl.classList.remove('active'); }

function showMessage(text, type = 'info') {
    messageEl.textContent = text;
    messageEl.className = 'message active ' + type;
    setTimeout(() => {
        messageEl.classList.remove('active');
    }, 5000);
}

function clearForms() {
    loginEmail.value = '';
    loginPassword.value = '';
    signupName.value = '';
    signupEmail.value = '';
    signupPassword.value = '';
    signupConfirm.value = '';
}

// Tabs
tabBtnsEl.forEach(btn => {
    btn.addEventListener('click', function() {
        tabBtnsEl.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tab + 'Form').classList.add('active');
        messageEl.classList.remove('active');
    });
});

// Signup
signupFormEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = signupName.value.trim();
    const email = signupEmail.value.trim();
    const password = signupPassword.value;
    const confirm = signupConfirm.value;
    
    if (!name || !email || !password || !confirm) {
        showMessage('Tafadhali jaza sehemu zote', 'error');
        return;
    }
    if (password !== confirm) {
        showMessage('Nenosiri hazifanani!', 'error');
        return;
    }
    if (password.length < 6) {
        showMessage('Nenosiri lazima liwe na angalau herufi 6', 'error');
        return;
    }
    
    showLoading();
    try {
        const result = await auth.createUserWithEmailAndPassword(email, password);
        await result.user.updateProfile({ displayName: name });
        hideLoading();
        showMessage('✅ Akaunti imeundwa! Karibu!', 'success');
        clearForms();
    } catch (error) {
        hideLoading();
        let msg = 'Kosa: ';
        switch (error.code) {
            case 'auth/email-already-in-use': msg += 'Barua pepe hii tayari inatumika.'; break;
            case 'auth/invalid-email': msg += 'Barua pepe si sahihi.'; break;
            case 'auth/weak-password': msg += 'Nenosiri ni dhaifu.'; break;
            default: msg += error.message;
        }
        showMessage(msg, 'error');
    }
});

// Login
loginFormEl.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = loginEmail.value.trim();
    const password = loginPassword.value;
    
    if (!email || !password) {
        showMessage('Tafadhali jaza barua pepe na nenosiri', 'error');
        return;
    }
    
    showLoading();
    try {
        await auth.signInWithEmailAndPassword(email, password);
        hideLoading();
        showMessage('✅ Umefanikiwa kuingia!', 'success');
        clearForms();
    } catch (error) {
        hideLoading();
        let msg = 'Kosa: ';
        switch (error.code) {
            case 'auth/user-not-found': msg += 'Akaunti haipatikani. Jiandikisha kwanza.'; break;
            case 'auth/wrong-password': msg += 'Nenosiri si sahihi.'; break;
            case 'auth/invalid-email': msg += 'Barua pepe si sahihi.'; break;
            case 'auth/too-many-requests': msg += 'Majaribio mengi sana. Jaribu tena baadaye.'; break;
            default: msg += error.message;
        }
        showMessage(msg, 'error');
    }
});

// Google Sign In
signInBtn.addEventListener('click', async () => {
    showLoading();
    try {
        await auth.signInWithPopup(googleProvider);
        hideLoading();
        showMessage('✅ Umefanikiwa kuingia na Google!', 'success');
    } catch (error) {
        hideLoading();
        if (error.code === 'auth/popup-blocked') {
            showMessage('⚠️ Ruhusu popups kwenye browser yako.', 'error');
        } else if (error.code === 'auth/popup-closed-by-user') {
            showMessage('Umeghairi kuingia.', 'info');
        } else if (error.code !== 'auth/cancelled-popup-request') {
            showMessage('Kosa: ' + error.message, 'error');
        }
    }
});

// Logout
function handleLogout() {
    auth.signOut().then(() => {
        appContent.classList.remove('visible');
        loginScreen.style.display = 'flex';
    }).catch((error) => {
        console.error('Logout error:', error);
    });
}

// Auth State
auth.onAuthStateChanged((user) => {
    if (user) {
        console.log('✅ Mtumiaji ameingia:', user.email);
        loginScreen.style.display = 'none';
        appContent.classList.add('visible');
        renderCommands();
    } else {
        console.log('🔴 Mtumiaji ametoka');
        loginScreen.style.display = 'flex';
        appContent.classList.remove('visible');
    }
});
